    <title>프라임S 진단서</title>

  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect 복원
      (function(){
        var r = sessionStorage.getItem('spa-redirect');
        if (r) { sessionStorage.removeItem('spa-redirect'); history.replaceState(null, '', r); }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
